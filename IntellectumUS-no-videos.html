    function accentOf(L) {
      return { c: L.accent, soft: L.accentSoft, ink: L.accentInk, c2: L.accent2 || L.accent };
    }

    function useRoute() {
      const parse = () => {
        const h = (window.location.hash || '#/').replace(/^#/, '');
        const m = h.match(/^\/line\/([\w-]+)/);
        return m ? { name: 'line', id: m[1] } : { name: 'overview' };
      };
      const [route, setRoute] = React.useState(parse);
      React.useEffect(() => {
        const on = () => setRoute(parse());
        window.addEventListener('hashchange', on);
        return () => window.removeEventListener('hashchange', on);
      }, []);
      return route;
    }

    // Scroll-reveal controller — IntersectionObserver with setInterval fallback
    const _revealItems = new Set();
    const _io = typeof IntersectionObserver !== 'undefined'
      ? new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            _revealItems.forEach(item => {
              if (item.ref.current === entry.target) { item.show(); _revealItems.delete(item); _io.unobserve(entry.target); }
            });
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -5% 0px' })
      : null;

    function _revealRegister(item) {
      _revealItems.add(item);
      if (_io && item.ref.current) _io.observe(item.ref.current);
    }

    // Fallback for browsers without IntersectionObserver
    if (!_io) {
      setInterval(() => {
        _revealItems.forEach(item => {
          if (!item.ref.current) return;
          const r = item.ref.current.getBoundingClientRect();
          if (r.top < window.innerHeight * 0.93) { item.show(); _revealItems.delete(item); }
        });
      }, 120);
    }

    function Reveal({ children, delay = 0, y = 22, style = {}, as: Tag = 'div' }) {
      const ref = React.useRef(null);
      const [on, setOn] = React.useState(false);
      React.useEffect(() => {
        const item = { ref, show: () => setOn(true) };
        _revealRegister(item);
        const fs = setTimeout(() => { setOn(true); _revealItems.delete(item); }, 3000);
        return () => { _revealItems.delete(item); clearTimeout(fs); };
      }, []);
      return (
        <Tag ref={ref} style={{
          opacity: on ? 1 : 0,
          transform: on ? 'none' : `translateY(${y}px)`,
          transition: `opacity .55s ${delay}ms cubic-bezier(.22,1,.36,1), transform .55s ${delay}ms cubic-bezier(.22,1,.36,1)`,
          ...style,
        }}>{children}</Tag>
      );
    }

    function Pill({ children, accent = WARM.primary, soft, onLight = false }) {

          fontFamily: FONT.mono, fontSize: 11, letterSpacing: '0.13em', textTransform: 'uppercase',

    // Line color chip
    function LineChip({ L, size = 24 }) {
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: size, height: size, borderRadius: size * 0.32,
          background: L.accentSoft, border: `1.5px solid ${L.accent}30`,
          fontFamily: FONT.mono, fontSize: size * 0.42, fontWeight: 500,
          color: L.accentInk, flexShrink: 0,
        }}>{L.n}</span>
      );
    }

    // CTA button
    function Cta({ children, variant = 'primary', accent = WARM.primary, onClick, href, type }) {
      const base = {
        fontFamily: FONT.body, fontWeight: 600, fontSize: 14.5, padding: '12px 22px',
        borderRadius: R.pill, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 7,
        textDecoration: 'none', transition: 'transform .15s, box-shadow .18s, background .15s', whiteSpace: 'nowrap',
      };
      const styles = {
        primary:    { border: 'none', background: accent, color: '#fff', boxShadow: `0 2px 12px ${accent}44` },
        ghost:      { border: `1.5px solid ${accent}`, background: 'transparent', color: accent },
        light:      { border: 'none', background: '#fff', color: WARM.ink, boxShadow: '0 2px 12px rgba(0,0,0,0.12)' },
        lightGhost: { border: '1.5px solid rgba(255,255,255,0.5)', background: 'transparent', color: '#fff' },
      };
      const merged = { ...base, ...(styles[variant] || styles.primary) };
      const handleEnter = e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = variant === 'primary' ? `0 6px 20px ${accent}55` : ''; };
      const handleLeave = e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = merged.boxShadow || ''; };
      if (href) return <a href={href} style={merged} onMouseEnter={handleEnter} onMouseLeave={handleLeave}>{children}</a>;
      return <button style={merged} onClick={onClick} type={type} onMouseEnter={handleEnter} onMouseLeave={handleLeave}>{children}</button>;
    }

    // Image placeholder panel
    function Plate({ label, accent = WARM.primary, radius = R.lg, height = 360, kicker = 'IMAGE', dark = false, style = {}, src }) {
      if (src) {
        return (
          <div style={{ height, borderRadius: radius, overflow: 'hidden', position: 'relative', background: '#111', ...style }}>

      const grad = `linear-gradient(135deg, ${accent}22 0%, ${accent}08 100%)`;
      return (
        <div style={{ height, borderRadius: radius, background: dark ? `${accent}18` : grad, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden', border: dark ? `1px solid ${accent}30` : `1px solid ${accent}18`, ...style }}>

    // QUOTE MODAL (global)
    // ═══════════════════════════════════════════════════════════

    function QuoteModal({ onClose }) {
      const [form, setForm] = React.useState({ name: '', email: '', district: '', phone: '', notes: '' });
      const [errors, setErrors] = React.useState({});
      const [submitted, setSubmitted] = React.useState(false);
      const [loading, setLoading] = React.useState(false);

      const handleChange = e => {
        setForm(p => ({ ...p, [e.target.name]: e.target.value }));
        if (errors[e.target.name]) setErrors(p => ({ ...p, [e.target.name]: '' }));
      };
      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Name is required';
        if (!form.email.trim()) e.email = 'Work email is required';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Please enter a valid email';
        if (!form.district.trim()) e.district = 'District or school name is required';
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      const handleSubmit = e => {
        e.preventDefault();
        if (!validate()) return;
        setLoading(true);
        setTimeout(() => { setLoading(false); setSubmitted(true); }, 1600);
      };

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box" style={{ maxWidth: 500 }}>
            <button className="modal-close" onClick={onClose}>✕</button>
            {submitted ? (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ width: 64, height: 64, borderRadius: '50%', background: WARM.primarySoft, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', fontSize: 28 }}>📬</div>
                <h3 style={{ margin: '0 0 10px', fontFamily: FONT.display, fontSize: 24, fontWeight: 700, color: WARM.ink }}>Quote request received.</h3>
                <p style={{ margin: '0 0 24px', fontFamily: FONT.body, fontSize: 15, color: WARM.ink2, lineHeight: 1.6 }}>
                  Your dedicated account manager will reach out within <strong>1 business day</strong> with a scoped commercial offer.
                </p>
                <Cta accent={WARM.primary} onClick={onClose}>Close</Cta>
              </div>
            ) : (
              <>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontFamily: FONT.mono, fontSize: 10.5, letterSpacing: '0.15em', color: WARM.mute, marginBottom: 8 }}>COMMERCIAL OFFER</div>
                  <h2 style={{ margin: 0, fontFamily: FONT.display, fontSize: 26, fontWeight: 700, letterSpacing: '-0.025em', color: WARM.ink }}>Request a quote</h2>
                  <p style={{ margin: '8px 0 0', fontFamily: FONT.body, fontSize: 14, color: WARM.ink2 }}>We'll respond within 1 business day with a scoped proposal.</p>
                </div>
                <form onSubmit={handleSubmit}>
                  <div className="quote-form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
                    <div className="field-group" style={{ margin: 0 }}>
                      <label className="field-label" htmlFor="q-name">First & last name</label>
                      <input id="q-name" name="name" value={form.name} onChange={handleChange} className="field-input" placeholder="Dr. Jane Smith" aria-invalid={!!errors.name} aria-describedby={errors.name ? 'q-name-err' : undefined} required/>
                      {errors.name && <span id="q-name-err" role="alert" style={{ fontSize: 12, color: '#c0392b', marginTop: 4, display: 'block' }}>{errors.name}</span>}
                    </div>
                    <div className="field-group" style={{ margin: 0 }}>
                      <label className="field-label" htmlFor="q-email">Work email</label>
                      <input id="q-email" name="email" type="email" value={form.email} onChange={handleChange} className="field-input" placeholder="jsmith@district.edu" aria-invalid={!!errors.email} aria-describedby={errors.email ? 'q-email-err' : undefined} required/>
                      {errors.email && <span id="q-email-err" role="alert" style={{ fontSize: 12, color: '#c0392b', marginTop: 4, display: 'block' }}>{errors.email}</span>}
                    </div>
                  </div>
                  <div className="field-group">
                    <label className="field-label" htmlFor="q-district">District or school name</label>
                    <input id="q-district" name="district" value={form.district} onChange={handleChange} className="field-input" placeholder="Jefferson County Unified School District" aria-invalid={!!errors.district} aria-describedby={errors.district ? 'q-district-err' : undefined} required/>
                    {errors.district && <span id="q-district-err" role="alert" style={{ fontSize: 12, color: '#c0392b', marginTop: 4, display: 'block' }}>{errors.district}</span>}
                  </div>
                  <div className="field-group">
                    <label className="field-label" htmlFor="q-phone">Phone (optional)</label>
                    <input id="q-phone" name="phone" type="tel" value={form.phone} onChange={handleChange} className="field-input" placeholder="+1 (555) 000-0000"/>
                  </div>
                  <div className="field-group">
                    <label className="field-label" htmlFor="q-notes">What do you need? (optional)</label>
                    <textarea id="q-notes" name="notes" value={form.notes} onChange={handleChange} className="field-input" rows={3} placeholder="e.g. 40 classrooms, STEM lab, district-wide furniture refresh…" style={{ resize: 'vertical' }}/>
                  </div>
                  <Cta accent={WARM.primary} type="submit">
                    {loading
                      ? <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ width: 14, height: 14, border: '2px solid rgba(255,255,255,0.4)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin 0.7s linear infinite', display: 'inline-block' }}/>
                          Sending…
                        </span>
                      : 'Send quote request →'
                    }
                  </Cta>
                </form>
              </>
            )}
          </div>
        </div>
      );
    }

          <div className="line-switcher" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
            {others.map(L => (
              <a key={L.id} href={`#/line/${L.id}`} style={{ textDecoration: 'none' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderRadius: R.md, border: `1.5px solid ${WARM.hairline}`, background: WARM.card, transition: 'border-color .15s, transform .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = L.accent + '60'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = WARM.hairline; e.currentTarget.style.transform = 'none'; }}
                >
                  <LineChip L={L} size={30}/>
                  <div>
                    <div style={{ fontFamily: FONT.body, fontWeight: 600, fontSize: 13, color: WARM.ink }}>{L.name}</div>
                    <div style={{ fontFamily: FONT.body, fontSize: 11.5, color: WARM.mute }}>{L.catalog.length} categories</div>
                  </div>
                </div>
              </a>
            ))}
          </div>
        </section>
      );
    }

    // "Pairs well with" — cross-links to 1-2 complementary departments
    function LinePairing({ L, lines }) {
      const a = accentOf(L);
      const partners = (L.pairsWith || []).map(id => lines.find(x => x.id === id)).filter(Boolean);
      if (!partners.length) return null;
      return (
        <section style={{ padding: '40px 36px 0', maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ borderRadius: R.lg, border: `1.5px solid ${a.c}28`, background: a.soft, padding: '24px 26px', display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 18 }}>
            <div style={{ fontFamily: FONT.mono, fontSize: 10.5, letterSpacing: '0.14em', color: a.ink, whiteSpace: 'nowrap' }}>PAIRS WELL WITH</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, flex: 1 }}>
              {partners.map(P => (
                <a key={P.id} href={`#/line/${P.id}`} style={{
                  display: 'inline-flex', alignItems: 'center', gap: 9, padding: '9px 16px 9px 9px', borderRadius: R.pill,
                  textDecoration: 'none', background: WARM.paper, border: `1px solid ${WARM.hairline}`, transition: 'transform .15s, border-color .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.borderColor = P.accent + '60'; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.borderColor = WARM.hairline; }}>
                  <LineChip L={P} size={24}/>
                  <span style={{ fontFamily: FONT.body, fontWeight: 600, fontSize: 13, color: WARM.ink }}>{P.name}</span>
                  <span style={{ fontFamily: FONT.body, fontSize: 12, color: WARM.mute }}>→</span>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // "Next department" — guided tour link to keep visitors moving through the catalog
    function LineNextNav({ current, lines }) {
      const i = lines.findIndex(x => x.id === current.id);
      const next = lines[(i + 1) % lines.length];
      const a = accentOf(next);
      return (
        <section style={{ padding: '16px 36px 0', maxWidth: 1400, margin: '0 auto' }}>
          <a href={`#/line/${next.id}`} style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, textDecoration: 'none',
            padding: '20px 26px', borderRadius: R.lg, border: `1.5px solid ${WARM.hairline}`, background: WARM.card,
            transition: 'border-color .15s, transform .15s' }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = a.c + '60'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = WARM.hairline; e.currentTarget.style.transform = 'none'; }}>
            <div>
              <div style={{ fontFamily: FONT.mono, fontSize: 10.5, letterSpacing: '0.14em', color: WARM.mute, marginBottom: 6 }}>NEXT DEPARTMENT</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <LineChip L={next} size={28}/>
                <span style={{ fontFamily: FONT.display, fontSize: 19, fontWeight: 700, color: WARM.ink, letterSpacing: '-0.02em' }}>{next.name}</span>
              </div>
            </div>
            <div style={{ fontFamily: FONT.body, fontSize: 22, color: a.c }}>→</div>
          </a>
        </section>
      );
    }

    function LinePage({ L, lines, onQuoteClick }) {
      React.useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [L.id]);
      return (
        <div>
          <LineHero L={L}/>
          <LineFeatures L={L}/>
          <LineStats L={L}/>
          <LineQuote L={L}/>
          <LineCatalog L={L}/>
          <LinePairing L={L} lines={lines}/>
          <LineNextNav current={L} lines={lines}/>
          <LineSwitcher current={L} lines={lines}/>
        </div>
      );
    }

    function OverviewPage({ lines, onQuoteClick, onMatchClick }) {
      return (
        <div>
          <HeroSection lines={lines} onQuoteClick={onQuoteClick} onMatchClick={onMatchClick}/>
          <MatcherSection onMatchClick={onMatchClick}/>
          <TrustStrip onQuoteClick={onQuoteClick}/>
        </div>
      );
    }

    function App() {
      const route = useRoute();
      const activeLine = route.name === 'line' ? LINES.find(L => L.id === route.id) : null;
      const navAccent = activeLine ? activeLine.accent : WARM.primary;
      const [showQuote, setShowQuote] = React.useState(false);
      const [showMatcher, setShowMatcher] = React.useState(false);

      React.useEffect(() => {
        if (route.name !== 'line') return;
        setShowQuote(false);
        setShowMatcher(false);
      }, [route.name, activeLine?.id]);

      return (
        <div style={{ minHeight: '100vh', background: WARM.paper }}>
          <TopNav accent={navAccent} route={route} lines={LINES} onQuoteClick={() => setShowQuote(true)}/>
          <main id="main-content" role="main">
            {activeLine
              ? <LinePage L={activeLine} lines={LINES} onQuoteClick={() => setShowQuote(true)}/>
              : <OverviewPage lines={LINES} onQuoteClick={() => setShowQuote(true)} onMatchClick={() => setShowMatcher(true)}/>
            }
          </main>
          <Footer lines={LINES}/>
          {showQuote   && <QuoteModal    onClose={() => setShowQuote(false)}/>}
          {showMatcher && <EquipmentMatcher onClose={() => setShowMatcher(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
